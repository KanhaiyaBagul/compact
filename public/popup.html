<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Compact AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="p-4 bg-transparent text-slate-800">
    <div class="glass-container flex h-full">
      <!-- Sidebar / Info Panel -->
      <aside class="w-64 border-r border-slate-200/50 p-6 flex flex-col gap-6 bg-slate-50/80">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
             <span class="text-white font-bold text-xl font-calistoga">C</span>
          </div>
          <h1 class="text-xl font-bold text-slate-800 font-calistoga tracking-wide">Compact</h1>
        </div>

        <div class="flex flex-col gap-4 flex-grow">
          <div class="floating-card flex flex-col gap-1">
             <span class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Current Target</span>
             <span id="pr-url" class="text-xs text-slate-600 truncate font-mono">Loading...</span>
          </div>

          <div id="status-panel" class="floating-card flex items-center gap-3">
             <div id="status-icon" class="text-blue-500"></div>
             <span class="text-xs text-slate-700 font-semibold">System Ready</span>
          </div>
        </div>

        <div class="flex flex-col gap-3">
           <button id="rerun-btn" type="button" class="btn-premium w-full text-xs">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61 5.002 5.002 0 008.715 1.333H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" />
              </svg>
              Refresh Review
           </button>
           <button id="download-btn" disabled class="w-full text-xs font-semibold py-2 rounded-xl border border-slate-300 text-slate-500 bg-white opacity-50 transition-all hover:bg-slate-50 disabled:hover:bg-white shadow-[0_2px_8px_-2px_rgba(0,0,0,0.05)]">
              Export PDF
           </button>
        </div>
      </aside>

      <!-- Main Content Area -->
      <main class="flex-grow p-6 flex flex-col gap-4 overflow-hidden bg-white/90">
        <div class="flex justify-between items-center">
           <h2 class="text-sm font-semibold text-slate-500 tracking-wider uppercase">AI Code Analysis</h2>
           <div id="stats-badge" class="bg-blue-50 text-blue-600 text-[10px] px-2.5 py-1 rounded-full border border-blue-200 font-bold hidden shadow-sm">
             MODEL ACTIVE
           </div>
        </div>

        <div class="flex-grow overflow-y-auto custom-scrollbar pr-2">
           <div id="result" class="animate-fade leading-relaxed">
              <!-- Result content injected here -->
           </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="popup.js"></script>
    <style>
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.5); }
      .font-calistoga { font-family: 'Calistoga', serif; }
      body { font-family: 'Inter', sans-serif; }
    </style>
  </body>
</html>

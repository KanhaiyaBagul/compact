<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mermaid Sandbox</title>
  <script src="mermaid.js"></script>
  <style>
    body { margin: 0; padding: 0; background: transparent; }
  </style>
</head>
<body>
<script>
  // Sandboxed pages can use eval - this is the correct MV3 pattern.
  // Initialize Mermaid with a theme that matches the light UI.
  mermaid.initialize({
    startOnLoad: false,
    theme: 'default',
    themeVariables: {
      primaryColor: '#eff6ff',
      lineColor: '#3b82f6',
      textColor: '#1e293b',
      mainBkg: '#f8fafc',
      nodeBorder: '#cbd5e1',
      clusterBkg: '#f1f5f9',
      titleColor: '#1e293b',
      edgeLabelBackground: '#ffffff',
    },
    fontFamily: 'Inter, sans-serif',
    flowchart: { curve: 'basis', useMaxWidth: true },
    sequence: { useMaxWidth: true },
  });

  // Listen for diagram render requests from the popup.
  window.addEventListener('message', async (event) => {
    const { id, code } = event.data || {};
    if (!id || !code) return;

    try {
      const elemId = 'mermaid-render-' + id;
      const { svg } = await mermaid.render(elemId, code);
      event.source.postMessage({ id, svg, error: null }, '*');
    } catch (err) {
      event.source.postMessage({ id, svg: null, error: err.message || String(err) }, '*');
    }
  });
</script>
</body>
</html>
